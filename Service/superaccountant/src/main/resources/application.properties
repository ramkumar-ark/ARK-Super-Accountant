spring.application.name=superaccountant

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/superaccountant
spring.datasource.username=postgres
spring.datasource.password=Arkpostgres@2020
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
# JWT_SECRET must be set as an environment variable (min 32 characters). Application will not start without it.
arktech.app.jwtExpirationMs=86400000

# File Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Phase 2 migration: before deploying role restructuring, apply db/migration/V2__role_restructuring.sql
